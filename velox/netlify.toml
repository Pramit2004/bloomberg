[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                     = "DENY"
    X-Content-Type-Options              = "nosniff"
    X-XSS-Protection                    = "1; mode=block"
    Referrer-Policy                     = "strict-origin-when-cross-origin"
    Permissions-Policy                  = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security           = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy             = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self'; frame-ancestors 'none';"

# ── Cache: immutable hashed assets ────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: HTML never cached ───────────────────────────────────
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
